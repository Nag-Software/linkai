name: Run automation

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-fullbooked:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger publish-fullbooked automation
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          APP_URL="${APP_URL%/}"
          curl --fail --show-error --silent \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/api/cron/publish-fullbooked"
